<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR.IA — Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      width: 380px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 2.5rem; font-weight: 800; color: #0f172a; letter-spacing: -1px; }
    .logo h1 span { color: #2563eb; }
    .logo p { color: #64748b; font-size: 0.875rem; margin-top: 4px; }
    label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0;
      border-radius: 8px; font-size: 0.95rem; margin-bottom: 16px;
      transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    button {
      width: 100%; padding: 11px; background: #2563eb; color: white;
      border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; margin-top: 4px; transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    .error {
      background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
      border-radius: 8px; padding: 10px 14px; font-size: 0.875rem; margin-bottom: 16px;
    }
    .back { text-align: center; margin-top: 20px; }
    .back a { color: #64748b; font-size: 0.8rem; text-decoration: none; }
    .back a:hover { color: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>AR<span>.</span>IA</h1>
      <p>Intelligence artificielle pour vos données</p>
    </div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <label>Identifiant</label>
      <input type="text" name="username" placeholder="Votre identifiant" required autofocus>
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="Votre mot de passe" required>
      <button type="submit">Se connecter</button>
    </form>
    <div class="back">
      <a href="https://ar-ia.fr">← Retour au site</a>
    </div>
  </div>
</body>
</html>
