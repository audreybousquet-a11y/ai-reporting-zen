<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ar.ia — Votre Assistant Reporting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f8fdfb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: 320px;
      max-width: 90vw;
      margin-bottom: 3rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1.5px solid #3AA48F;
      border-radius: 50px;
      padding: 12px 28px;
      margin-bottom: 2rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #3AA48F;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .badge-text {
      font-size: 15px;
      font-weight: 500;
      color: #3AA48F;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    p {
      font-size: 1.05rem;
      color: #888;
      max-width: 420px;
      line-height: 1.7;
      margin: 0 auto 2.5rem;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      font-size: 13px;
      color: #bbb;
    }
  </style>
</head>
